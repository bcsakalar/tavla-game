name: tavla-online

services:
  postgres:
    image: postgres:16-alpine
    container_name: tavla-db
    environment:
      POSTGRES_DB: tavla_db
      POSTGRES_USER: tavla_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tavla_user -d tavla_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: tavla-server
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://tavla_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/tavla_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-development}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-development}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-development}
      CORS_ORIGIN: "*"
    ports:
      - "3006:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata_dev:
