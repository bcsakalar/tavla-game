version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tavla-postgres
    environment:
      POSTGRES_DB: tavla_db
      POSTGRES_USER: tavla_user
      POSTGRES_PASSWORD: tavla_secret_2024
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tavla_user -d tavla_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: tavla-server
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://tavla_user:tavla_secret_2024@postgres:5432/tavla_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: tavla-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
