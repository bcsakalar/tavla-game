# ============================================================
# Tavla Online — Nginx Production Config
# Domain: tavla.berkecansakalar.com
# Backend: 127.0.0.1:3005 (Docker container)
# SSL: Cloudflare Origin Certificate (Full Strict)
# ============================================================

# Rate limiting zone — brute force koruması
limit_req_zone $binary_remote_addr zone=tavla_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=tavla_ws:10m rate=10r/s;

# Upstream — Docker container
upstream tavla_backend {
    server 127.0.0.1:3005;
    keepalive 32;
}

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    listen [::]:80;
    server_name tavla.berkecansakalar.com;

    # Cloudflare üzerinden gelen HTTP trafiğini HTTPS'e yönlendir
    return 301 https://$server_name$request_uri;
}

# HTTPS — Ana sunucu bloğu
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tavla.berkecansakalar.com;

    # ─── SSL (Cloudflare Origin Certificate) ───────────────
    ssl_certificate     /etc/ssl/tavla/origin.pem;
    ssl_certificate_key /etc/ssl/tavla/origin-key.pem;

    # SSL protokol ve cipher ayarları
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ─── Güvenlik Başlıkları ───────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Gzip Sıkıştırma ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ─── Genel Proxy Ayarları ──────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Cloudflare gerçek IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ─── Socket.IO WebSocket ──────────────────────────────
    location /socket.io/ {
        limit_req zone=tavla_ws burst=20 nodelay;

        proxy_pass http://tavla_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout — oyun süresi boyunca açık kalmalı
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # WebSocket buffering kapalı
        proxy_buffering off;
        proxy_cache off;
    }

    # ─── Health Check (rate limit yok) ─────────────────────
    location = /health {
        proxy_pass http://tavla_backend;
        access_log off;
    }

    # ─── API Endpoint'leri ─────────────────────────────────
    location /api/ {
        limit_req zone=tavla_api burst=50 nodelay;

        proxy_pass http://tavla_backend;

        # API response caching kapalı (dinamik veri)
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ─── Admin Panel ───────────────────────────────────────
    location /admin {
        # Admin panele sadece Cloudflare üzerinden erişim
        limit_req zone=tavla_api burst=20 nodelay;

        proxy_pass http://tavla_backend;
    }

    # ─── Statik Dosyalar (Admin CSS/JS/Images) ─────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://tavla_backend;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # ─── Genel Proxy (Fallback) ────────────────────────────
    location / {
        limit_req zone=tavla_api burst=50 nodelay;
        proxy_pass http://tavla_backend;
    }

    # ─── Güvenlik — Hassas dosyalara erişim engelle ────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Loglar ────────────────────────────────────────────
    access_log /var/log/nginx/tavla.berkecansakalar.com.access.log;
    error_log  /var/log/nginx/tavla.berkecansakalar.com.error.log warn;

    # ─── İstek boyutu sınırı ──────────────────────────────
    client_max_body_size 5M;
    client_body_timeout 10s;
    client_header_timeout 10s;
}
