name: tavla-prod

services:
  # ─── PostgreSQL Veritabanı ───────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tavla-prod-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tavla_db}
      POSTGRES_USER: ${POSTGRES_USER:-tavla_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - tavla_pgdata_prod:/var/lib/postgresql/data
    networks:
      - tavla-prod-network
    # Port dışarıya AÇILMIYOR — sadece internal network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tavla_user} -d ${POSTGRES_DB:-tavla_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Node.js Tavla Server ───────────────────────────────
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: tavla-prod-server
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-tavla_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tavla_db}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      CORS_ORIGIN: https://tavla.berkecansakalar.com
      MOVE_TIMER_SECONDS: ${MOVE_TIMER_SECONDS:-60}
      RECONNECT_WINDOW_SECONDS: ${RECONNECT_WINDOW_SECONDS:-60}
    ports:
      - "127.0.0.1:3005:3000"  # Sadece localhost — Nginx üzerinden erişim
    networks:
      - tavla-prod-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  tavla-prod-network:
    driver: bridge

volumes:
  tavla_pgdata_prod:
    name: tavla_pgdata_prod
