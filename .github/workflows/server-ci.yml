name: Server CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tavla
          POSTGRES_PASSWORD: tavla_test_pass
          POSTGRES_DB: tavla_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: tavla_test
      DB_USER: tavla
      DB_PASSWORD: tavla_test_pass
      JWT_SECRET: test-jwt-secret-ci
      JWT_REFRESH_SECRET: test-refresh-secret-ci
      SESSION_SECRET: test-session-secret-ci

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Lint
        working-directory: server
        run: npm run lint

      - name: Run migrations
        working-directory: server
        run: npm run migrate

      - name: Run tests
        working-directory: server
        run: npm test -- --coverage --forceExit

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage/

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: server
        run: docker build -t tavla-server:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run --rm tavla-server:${{ github.sha }} node -e "console.log('Docker build OK')"
