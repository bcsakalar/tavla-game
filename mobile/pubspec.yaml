name: tavla_online
description: Tavla (Backgammon) Online - Real-time multiplayer game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  socket_io_client: ^2.0.3+1
  http: ^1.2.1
  dio: ^5.4.3+1

  # Local Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^14.2.0

  # UI
  google_fonts: ^6.2.1

  # Audio & Haptics
  audioplayers: ^6.0.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
